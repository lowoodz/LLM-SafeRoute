server:
  listen: "127.0.0.1:8080"
  default_fallback_group: high

pipeline:
  dlp_enabled: true
  operation_security_mode: enforce  # observe | enforce

logging:
  level: info
  redact_content: true

fallback_groups:
  high:
    - id: openai-primary
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o-mini"
      api_key_env: OPENAI_API_KEY
      timeout_secs: 120
    - id: anthropic-fallback
      base_url: "https://api.anthropic.com/v1"
      model: "claude-sonnet-4-20250514"
      api_key_env: ANTHROPIC_API_KEY
      timeout_secs: 120
  medium:
    - id: openai-mini
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o-mini"
      api_key_env: OPENAI_API_KEY
  low:
    - id: deepseek
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      api_key_env: DEEPSEEK_API_KEY

content_rules:
  - id: example-secret
    enabled: true
    match_mode: full
    category: secret
    value: "sk-replace-with-your-key"
  - id: example-phrase
    enabled: true
    match_mode: fragment
    min_fragment_len: 8
    category: normal
    value: "公司内部机密项目"

file_rules:
  - id: example-secrets-dir
    enabled: false
    path: "./secrets"
    recursive: true
    trigger_window: 5
    match_mode: fragment
    min_fragment_len: 12

operation_rules:
  - id: block-rm-rf
    enabled: true
    operation: command_exec
    object:
      pattern: "rm -rf"
      is_regex: false
  - id: block-prod-api
    enabled: true
    operation: api_call
    object:
      pattern: "https://prod.example.com"
      is_regex: false

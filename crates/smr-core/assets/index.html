<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecureModelRoute</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d27; --text:#e6e8ef; --muted:#8b90a0; --accent:#5b8def; --ok:#3ecf8e; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); }
    header { padding:16px 24px; border-bottom:1px solid #2a2f3d; display:flex; gap:16px; align-items:center; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--ok); }
    main { padding:24px; max-width:1100px; margin:0 auto; }
    .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .tab { padding:8px 14px; border-radius:8px; background:var(--card); cursor:pointer; border:1px solid #2a2f3d; }
    .tab.active { border-color:var(--accent); color:var(--accent); }
    .panel { display:none; } .panel.active { display:block; }
    .card { background:var(--card); border:1px solid #2a2f3d; border-radius:12px; padding:16px; margin-bottom:16px; }
    textarea { width:100%; min-height:360px; background:#12151d; color:var(--text); border:1px solid #343948; border-radius:8px; padding:8px; font-family:monospace; font-size:12px; }
    button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; margin-right:8px; }
    button.secondary { background:#343948; }
    .hint { color:var(--muted); font-size:13px; }
    .url { font-family:monospace; background:#12151d; padding:8px; border-radius:8px; border:1px solid #343948; word-break:break-all; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    td,th { padding:8px; border-bottom:1px solid #2a2f3d; text-align:left; }
    .tag { background:#243049; color:#9ec1ff; padding:2px 8px; border-radius:999px; font-size:11px; }
    .model-card { background:#12151d; border:1px solid #343948; border-radius:8px; padding:10px; margin:6px 0; font-size:13px; }
    .group-title { font-weight:600; margin:12px 0 6px; color:#9ec1ff; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  </style>
</head>
<body>
<header><div class="dot"></div><h1>SecureModelRoute</h1><span class="hint" id="statusText">加载中...</span></header>
<main>
<div class="tabs">
  <div class="tab active" data-tab="overview">概览</div>
  <div class="tab" data-tab="routing">路由</div>
  <div class="tab" data-tab="config">配置</div>
  <div class="tab" data-tab="logs">日志</div>
</div>
<section class="panel active" id="overview">
  <div class="card"><h3>代理地址</h3><p class="hint">将 LLM 客户端 base_url 指向下方地址。</p><div class="url" id="proxyUrl">-</div><button onclick="copyUrl()">复制</button></div>
  <div class="card row">
    <div>默认组: <span id="defaultGroup">-</span></div>
    <div>操作安全: <span id="opMode">-</span></div>
    <div>DLP: <span id="dlpStatus">-</span></div>
    <div class="hint" id="configPath"></div>
  </div>
</section>
<section class="panel" id="routing">
  <div class="card"><p class="hint">Fallback 组内按顺序尝试，失败自动切换。编辑请前往「配置」页。</p><div id="routingView"></div></div>
</section>
<section class="panel" id="config">
  <div class="card"><textarea id="configEditor"></textarea><button onclick="saveConfig()">保存并应用</button><button class="secondary" onclick="reloadConfig()">重载</button></div>
</section>
<section class="panel" id="logs">
  <div class="card"><button class="secondary" onclick="loadEvents()">刷新</button><table><thead><tr><th>时间</th><th>类型</th><th>消息</th></tr></thead><tbody id="logBody"></tbody></table></div>
</section>
</main>
<script>
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab,.panel').forEach(e=>e.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active');});
async function loadStatus(){const s=await(await fetch('/api/status')).json();statusText.textContent='运行中 · '+s.listen;proxyUrl.textContent=s.proxy_url;defaultGroup.textContent=s.default_group;opMode.textContent=s.operation_mode;dlpStatus.textContent=s.dlp_enabled?'已启用':'已关闭';configPath.textContent=s.config_path;}
async function loadConfig(){const c=await(await fetch('/api/config')).json();configEditor.value=JSON.stringify(c,null,2);renderRouting(c);}
function renderRouting(c){const el=routingView;el.innerHTML='';const groups=c.fallback_groups||{};for(const [name,models] of Object.entries(groups)){const gt=document.createElement('div');gt.className='group-title';gt.textContent=name+(name===c.server.default_fallback_group?' (默认)':'');el.appendChild(gt);models.forEach((m,i)=>{const card=document.createElement('div');card.className='model-card';card.textContent=(i+1)+'. '+m.model+'  →  '+m.base_url;el.appendChild(card);});}}
async function saveConfig(){try{const cfg=JSON.parse(configEditor.value);const r=await fetch('/api/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});if(!r.ok)throw new Error(await r.text());alert('已保存');loadStatus();renderRouting(cfg);}catch(e){alert('失败: '+e.message);}}
async function reloadConfig(){await fetch('/api/reload',{method:'PUT'});await loadConfig();await loadStatus();}
function copyUrl(){navigator.clipboard.writeText(proxyUrl.textContent);alert('已复制');}
async function loadEvents(){const d=await(await fetch('/api/events?limit=80')).json();logBody.innerHTML='';for(const e of d.events){const k=typeof e.kind==='string'?e.kind:Object.keys(e.kind||{})[0];logBody.innerHTML+=`<tr><td>${e.timestamp.slice(0,19).replace('T',' ')}</td><td><span class="tag">${k}</span></td><td>${e.message}</td></tr>`;}}
loadStatus();loadConfig();loadEvents();setInterval(loadEvents,5000);
</script>
</body>
</html>
